<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment Cover Page Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cover">

    <img src="smu_logo.png" alt="Logo" class="logo">

    <p class="credit">Created by Mahadi Islam Chowdhury, CSE60</p>

    <div class="form-box">
      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="form-box">
      <label for="csa">CSA60:</label>
      <input type="text" id="csa" placeholder="Enter CSA60">
    </div>

    <div class="form-box">
      <label for="date">Date:</label>
      <input type="date" id="date">
    </div>

    <div class="form-box">
      <label for="faye">Faye:</label>
      <input type="text" id="faye" placeholder="Enter Faye">
    </div>

    <div class="form-box">
      <button id="generate">Generate Cover</button>
      <button id="download">Download PDF</button>
    </div>

  </div>

  <script src="script.js"></script>
  <script>
    window.onload = function() {
      document.getElementById("date").valueAsDate = new Date();
    };

    document.getElementById("generate").addEventListener("click", function() {
      let name = document.getElementById("name").value;
      let csa = document.getElementById("csa").value;
      let date = document.getElementById("date").value;
      let faye = document.getElementById("faye").value;

      console.log("Name:", name);
      console.log("CSA60:", csa);
      console.log("Date:", date);
      console.log("Faye:", faye);

      // Add your logic to generate the cover page here
    });
  </script>

</body>
</html>
